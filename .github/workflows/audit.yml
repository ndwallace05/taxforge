name: IRS Form Compliance Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run audit daily at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      form_name:
        description: "Specific form to audit (e.g., 1040, 1065)"
        required: false
        type: string

env:
  TAX_CALCULATOR_MIN_VERSION: "3.5.0"
  DRAKE_MIN_VERSION: "7.13.0"

jobs:
  tax-calculator-validation:
    name: Tax-Calculator Policy Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Tax-Calculator
        run: |
          pip install taxcalc>=${{ env.TAX_CALCULATOR_MIN_VERSION }}
          pip install pandas numpy

      - name: Verify Tax-Calculator Installation
        run: |
          python -c "import taxcalc; print(f'Tax-Calculator version: {taxcalc.__version__}')"
          python -c "import taxcalc; assert taxcalc.__version__ >= '${{ env.TAX_CALCULATOR_MIN_VERSION }}'"

      - name: Validate Policy Integration
        run: |
          # Check for Tax-Calculator commits
          git log --oneline --grep="tax-calc" --since="1 month ago" || echo "No recent Tax-Calculator commits found"

          # Validate schema files contain Tax-Calculator references
          find packages/irs-data/schemas -name "*.json" -exec grep -l "Tax-Calculator" {} \; || echo "No Tax-Calculator references in schemas"

      - name: Generate Policy Report
        run: |
          python -c "
          import json
          import os
          from pathlib import Path

          schema_dir = Path('packages/irs-data/schemas')
          report = {'forms': [], 'total_policies': 0, 'missing_policies': []}

          if schema_dir.exists():
              for schema_file in schema_dir.glob('*.json'):
                  try:
                      with open(schema_file) as f:
                          data = json.load(f)
                      
                      form_name = schema_file.stem
                      policies = [item for item in data if isinstance(item, dict) and item.get('source') == 'Tax-Calculator']
                      
                      report['forms'].append({
                          'form': form_name,
                          'policy_count': len(policies),
                          'policies': [p.get('policyId', 'unknown') for p in policies]
                      })
                      report['total_policies'] += len(policies)
                      
                      if not policies:
                          report['missing_policies'].append(form_name)
                  except Exception as e:
                      print(f'Error processing {schema_file}: {e}')

          with open('tax-calculator-report.json', 'w') as f:
              json.dump(report, f, indent=2)

          print(f'Total Tax-Calculator policies found: {report[\"total_policies\"]}')
          if report['missing_policies']:
              print(f'Forms missing Tax-Calculator policies: {report[\"missing_policies\"]}')
          "

      - name: Upload Tax-Calculator Report
        uses: actions/upload-artifact@v3
        with:
          name: tax-calculator-report
          path: tax-calculator-report.json

  drake-pipeline-validation:
    name: Drake Pipeline Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3.0"

      - name: Install Drake
        run: |
          R -e "install.packages(c('drake', 'jsonlite', 'testthat'), repos='https://cran.r-project.org')"

      - name: Verify Drake Installation
        run: |
          R -e "library(drake); cat('Drake version:', as.character(packageVersion('drake')), '\n')"

      - name: Create Drake Pipeline
        run: |
          mkdir -p pipelines
          cat > pipelines/audit_plan.R << 'EOF'
          library(drake)
          library(jsonlite)

          # Define the audit plan
          plan <- drake_plan(
            # Read all schema files
            schema_files = list.files("packages/irs-data/schemas", pattern = "*.json", full.names = TRUE),
            
            # Validate each schema
            schemas = target(
              lapply(schema_files, function(f) {
                tryCatch({
                  data <- fromJSON(f)
                  list(file = basename(f), valid = TRUE, lines = length(data))
                }, error = function(e) {
                  list(file = basename(f), valid = FALSE, error = e$message)
                })
              }),
              transform = map(schema_files)
            ),
            
            # Generate validation report
            validation_report = {
              results <- schemas
              valid_count <- sum(sapply(results, function(x) x$valid))
              total_count <- length(results)
              
              list(
                timestamp = Sys.time(),
                total_schemas = total_count,
                valid_schemas = valid_count,
                success_rate = valid_count / total_count,
                details = results
              )
            }
          )

          # Execute the plan
          make(plan)

          # Save report
          report <- readd(validation_report)
          writeLines(toJSON(report, pretty = TRUE), "drake-validation-report.json")

          cat("Drake pipeline completed successfully\n")
          cat("Valid schemas:", report$valid_schemas, "/", report$total_schemas, "\n")
          EOF

      - name: Run Drake Pipeline
        run: |
          cd pipelines
          R -f audit_plan.R

      - name: Test Pipeline Idempotency
        run: |
          cd pipelines
          echo "Running pipeline second time to test idempotency..."
          R -e "library(drake); make(plan); cat('Second run completed - should show all targets up-to-date\n')"

      - name: Upload Drake Report
        uses: actions/upload-artifact@v3
        with:
          name: drake-validation-report
          path: pipelines/drake-validation-report.json

  form-compliance-audit:
    name: Form Compliance Audit
    runs-on: ubuntu-latest
    needs: [tax-calculator-validation, drake-pipeline-validation]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download Tax-Calculator Report
        uses: actions/download-artifact@v3
        with:
          name: tax-calculator-report
          path: ./reports

      - name: Download Drake Report
        uses: actions/download-artifact@v3
        with:
          name: drake-validation-report
          path: ./reports

      - name: Run Form Compliance Tests
        run: |
          # Run specific form tests if specified
          if [ "${{ github.event.inputs.form_name }}" != "" ]; then
            pnpm run test:form "${{ github.event.inputs.form_name }}"
          else
            pnpm run test:ci
          fi

      - name: Generate Compliance Report
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          // Read reports
          const taxCalcReport = JSON.parse(fs.readFileSync('./reports/tax-calculator-report.json', 'utf8'));
          const drakeReport = JSON.parse(fs.readFileSync('./reports/drake-validation-report.json', 'utf8'));

          // Generate compliance summary
          const compliance = {
            timestamp: new Date().toISOString(),
            tax_calculator: {
              total_policies: taxCalcReport.total_policies,
              forms_with_policies: taxCalcReport.forms.filter(f => f.policy_count > 0).length,
              forms_missing_policies: taxCalcReport.missing_policies
            },
            drake_pipeline: {
              success_rate: drakeReport.success_rate,
              valid_schemas: drakeReport.valid_schemas,
              total_schemas: drakeReport.total_schemas
            },
            overall_status: taxCalcReport.total_policies > 0 && drakeReport.success_rate === 1 ? 'PASS' : 'FAIL'
          };

          fs.writeFileSync('compliance-report.json', JSON.stringify(compliance, null, 2));

          console.log('=== IRS FORM COMPLIANCE AUDIT SUMMARY ===');
          console.log('Tax-Calculator Policies:', compliance.tax_calculator.total_policies);
          console.log('Drake Pipeline Success Rate:', (compliance.drake_pipeline.success_rate * 100).toFixed(1) + '%');
          console.log('Overall Status:', compliance.overall_status);

          if (compliance.overall_status === 'FAIL') {
            console.error('❌ Compliance audit failed!');
            process.exit(1);
          } else {
            console.log('✅ Compliance audit passed!');
          }
          "

      - name: Upload Compliance Report
        uses: actions/upload-artifact@v3
        with:
          name: compliance-report
          path: compliance-report.json

      - name: Update Audit Badge
        if: github.ref == 'refs/heads/main'
        run: |
          # This would typically update a badge service
          echo "Audit completed at $(date)" > audit-status.txt

  generate-audit-documentation:
    name: Generate Audit Documentation
    runs-on: ubuntu-latest
    needs: [form-compliance-audit]
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download All Reports
        uses: actions/download-artifact@v3
        with:
          path: ./audit-reports

      - name: Generate Audit Documentation
        run: |
          mkdir -p ai-agent-instructions

          cat > ai-agent-instructions/AUDIT-SUMMARY.md << 'EOF'
          # IRS Form Compliance Audit Summary

          **Generated:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          **Workflow:** ${{ github.workflow }}
          **Run ID:** ${{ github.run_id }}

          ## Audit Status

          - **Tax-Calculator Integration**: [![Audit](https://github.com/${{ github.repository }}/actions/workflows/audit.yml/badge.svg)](https://github.com/${{ github.repository }}/actions/workflows/audit.yml)
          - **Drake Pipeline**: ✅ Validated
          - **Form Compliance**: ✅ Tested

          ## Quick Verification Commands

          ```bash
          # Verify Tax-Calculator policies
          find packages/irs-data/schemas -name "*.json" -exec grep -l "Tax-Calculator" {} \;

          # Check Drake pipeline
          cd pipelines && R -e "library(drake); make(plan)"

          # Run form tests
          pnpm run test:ci
          ```

          ## Reports

          - [Tax-Calculator Report](./audit-reports/tax-calculator-report/tax-calculator-report.json)
          - [Drake Validation Report](./audit-reports/drake-validation-report/drake-validation-report.json)
          - [Compliance Report](./audit-reports/compliance-report/compliance-report.json)

          EOF

      - name: Commit Audit Documentation
        if: github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add ai-agent-instructions/AUDIT-SUMMARY.md
          git diff --staged --quiet || git commit -m "docs: update audit summary [skip ci]"
          git push
